<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成邮箱</title>
    <style>
        #copyMessage {
            color: green;
            font-weight: bold;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>一次性生成50个邮箱</h1>

    <label for="customSuffix">自定义后缀（如：@example.com）:</label>
    <input type="text" id="customSuffix" placeholder="@584136.xyz">
    <button onclick="generateEmails()">生成邮箱</button>
    <button onclick="copyEmails()">复制所有邮箱</button>
    <ul id="emailList"></ul>
    <div id="copyMessage">所有邮箱已复制到剪贴板！</div>

    <script>
        // 生成随机字符串
        function generateRandomString(length) {
            const chars = 'abcdefghijklmnopqrstuvwxyz';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // 保存邮箱到cookie
        function saveToCookie(emails) {
            const emailListJson = JSON.stringify(emails);
            document.cookie = `emails=${emailListJson}; path=/; max-age=${60 * 60 * 24 * 7}`; // 保持7天
        }

        // 从cookie加载邮箱
        function loadFromCookie() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                if (cookie.trim().startsWith('emails=')) {
                    const emailListJson = cookie.split('=')[1];
                    return JSON.parse(decodeURIComponent(emailListJson)) || [];
                }
            }
            return [];
        }

        // 生成并显示邮箱
        function generateEmails() {
            const emailList = document.getElementById('emailList');
            const customSuffix = document.getElementById('customSuffix').value || '@584136.xyz'; // 如果没有输入后缀，使用默认后缀
            emailList.innerHTML = ''; // 清空现有列表

            const emails = [];

            for (let i = 0; i < 50; i++) {
                const prefix = generateRandomString(5);
                const email = prefix + customSuffix;
                emails.push(email);

                const listItem = document.createElement('li');
                listItem.textContent = email;
                emailList.appendChild(listItem);
            }

            saveToCookie(emails); // 保存邮箱到cookie
        }

        // 复制所有邮箱
        function copyEmails() {
            const emailList = document.getElementById('emailList');
            const emails = Array.from(emailList.getElementsByTagName('li'))
                                 .map(li => li.textContent)
                                 .join('\n');
            
            // 创建一个textarea元素用于复制
            const textarea = document.createElement('textarea');
            textarea.value = emails;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            // 显示成功提示
            const copyMessage = document.getElementById('copyMessage');
            copyMessage.style.display = 'block';

            // 设置3秒后自动隐藏提示
            setTimeout(() => {
                copyMessage.style.display = 'none';
            }, 3000);
        }

        // 页面加载时从cookie加载邮箱
        window.onload = function() {
            const savedEmails = loadFromCookie();
            if (savedEmails.length > 0) {
                const emailList = document.getElementById('emailList');
                savedEmails.forEach(email => {
                    const listItem = document.createElement('li');
                    listItem.textContent = email;
                    emailList.appendChild(listItem);
                });
            }
        }
    </script>
</body>
</html>
